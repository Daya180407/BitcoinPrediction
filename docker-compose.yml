version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: crypto_arena_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: crypto_arena
    networks:
      - crypto_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto_arena_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/crypto_arena
      - PORT=5000
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    networks:
      - crypto_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto_arena_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - crypto_net

networks:
  crypto_net:
    driver: bridge

volumes:
  mongo_data:
